<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — ERP Pecuario</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: Arial, sans-serif;
    background: #0d3b1e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.card {
    background: white;
    border-radius: 16px;
    padding: 32px 28px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.logo {
    text-align: center;
    margin-bottom: 24px;
}
.logo h2 { font-size: 20px; color: #1a3326; margin-top: 8px; }
.logo p  { font-size: 12px; color: #999; margin-top: 4px; }
.form-group { margin-bottom: 16px; }
label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: bold; }
input {
    width: 100%; padding: 12px; border-radius: 8px;
    border: 1px solid #ddd; font-size: 16px;
}
input:focus { outline: none; border-color: #27ae60; }
.btn {
    width: 100%; padding: 13px; background: #0d3b1e;
    color: white; border: none; border-radius: 8px;
    font-size: 15px; font-weight: bold; cursor: pointer;
    margin-top: 4px;
}
.btn:active { background: #1a5c30; }
.error {
    background: #fde8e8; color: #c0392b;
    padding: 10px 14px; border-radius: 8px;
    font-size: 14px; margin-bottom: 16px;
    border-left: 3px solid #e74c3c;
}
.back { text-align: center; margin-top: 16px; }
.back a { font-size: 13px; color: #999; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div style="font-size:40px;">🐄</div>
        <h2>Panel Admin</h2>
        <p>ERP Pecuario</p>
    </div>

    {% if error %}
    <div class="error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST">
        <div class="form-group">
            <label>Usuario</label>
            <input type="text" name="usuario" required
                   autocomplete="username" autocapitalize="none"
                   placeholder="Usuario administrador">
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <div style="position:relative;">
                <input type="password" name="contrasena" id="pass" required
                       autocomplete="current-password"
                       placeholder="Contraseña"
                       style="padding-right:44px;">
                <button type="button"
                        onclick="var i=document.getElementById('pass');
                                 i.type=i.type==='password'?'text':'password';"
                        style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                               background:none;border:none;cursor:pointer;color:#888;font-size:17px;">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>
        <button class="btn" type="submit">Entrar</button>
    </form>

    <div class="back">
        <a href="/">← Volver a la app</a>
    </div>
</div>
</body>
</html>
