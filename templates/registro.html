{% extends "base.html" %}
{% block content %}

<h2>🐄 Crear cuenta</h2>

<div class="card">

    {% if error %}
    <div class="flash error">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST">

        <div class="form-group">
            <label>Nombre de usuario</label>
            <input class="form-control" type="text" name="username"
                   placeholder="Mínimo 3 caracteres" minlength="3" required
                   autocomplete="username" autocapitalize="none">
        </div>

        <div class="form-group">
            <label>Correo electrónico <span style="color:#999;font-weight:normal;">(para recuperar contraseña)</span></label>
            <input class="form-control" type="email" name="email"
                   placeholder="tu@correo.com" required
                   autocomplete="email" inputmode="email">
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <div style="position:relative;">
                <input class="form-control" type="password" name="password"
                       id="pass1" placeholder="Mínimo 6 caracteres"
                       minlength="6" required autocomplete="new-password"
                       style="padding-right:48px;">
                <button type="button" onclick="toggleOjo('pass1','ojo1')"
                        style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                               background:none;border:none;cursor:pointer;color:#888;
                               font-size:18px;padding:4px;">
                    <i class="fas fa-eye" id="ojo1"></i>
                </button>
            </div>
        </div>

        <div class="form-group">
            <label>Confirmar contraseña</label>
            <div style="position:relative;">
                <input class="form-control" type="password" name="confirmar"
                       id="pass2" placeholder="Repite tu contraseña"
                       minlength="6" required autocomplete="new-password"
                       style="padding-right:48px;">
                <button type="button" onclick="toggleOjo('pass2','ojo2')"
                        style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                               background:none;border:none;cursor:pointer;color:#888;
                               font-size:18px;padding:4px;">
                    <i class="fas fa-eye" id="ojo2"></i>
                </button>
            </div>
        </div>

        <p style="font-size:12px; color:#999; text-align:center; margin:8px 0 14px 0; line-height:1.5;">
            Al crear una cuenta aceptas nuestra
            <a href="/privacidad" target="_blank" style="color:#27ae60;">Política de Privacidad</a>
            y nuestros <a href="/terminos" target="_blank" style="color:#27ae60;">Términos y Condiciones</a>.
        </p>

        <button class="btn-primary">✅ Crear cuenta</button>
    </form>

    <p style="margin-top:15px; text-align:center; font-size:14px; color:#666;">
        ¿Ya tienes cuenta? <a href="/login" style="color:#27ae60;">Iniciar sesión</a>
    </p>

</div>

<script>
function toggleOjo(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
    }
}
</script>

{% endblock %}
