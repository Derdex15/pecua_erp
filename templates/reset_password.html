{% extends "base.html" %}
{% block content %}

<h2>🔐 Nueva contraseña</h2>

<div class="card">
    <p style="font-size:15px; color:#555; margin-bottom:20px;">
        Crea una contraseña nueva para tu cuenta.
    </p>

    <form method="POST">
        <input type="hidden" name="token" value="{{ token }}">

        <div class="form-group">
            <label>Nueva contraseña</label>
            <div style="position:relative;">
                <input class="form-control" type="password" name="password"
                       id="pass1" placeholder="Mínimo 6 caracteres"
                       minlength="6" required autocomplete="new-password"
                       style="padding-right:48px;">
                <button type="button" onclick="toggleOjo('pass1','ojo1')"
                        style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                               background:none;border:none;cursor:pointer;color:#888;font-size:18px;
                               padding:4px;">
                    <i class="fas fa-eye" id="ojo1"></i>
                </button>
            </div>
        </div>

        <div class="form-group">
            <label>Confirmar contraseña</label>
            <div style="position:relative;">
                <input class="form-control" type="password" name="confirmar"
                       id="pass2" placeholder="Repite la contraseña"
                       minlength="6" required autocomplete="new-password"
                       style="padding-right:48px;">
                <button type="button" onclick="toggleOjo('pass2','ojo2')"
                        style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                               background:none;border:none;cursor:pointer;color:#888;font-size:18px;
                               padding:4px;">
                    <i class="fas fa-eye" id="ojo2"></i>
                </button>
            </div>
        </div>

        <button class="btn-primary">💾 Guardar nueva contraseña</button>
    </form>
</div>

<script>
function toggleOjo(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
    }
}
</script>

{% endblock %}
