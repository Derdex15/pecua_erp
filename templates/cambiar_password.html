{% extends "base.html" %}
{% block content %}

<h2>🔐 Cambiar contraseña</h2>

<div class="card">

    {% if error %}
    <div class="flash error">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST">

        <div class="form-group">
            <label>Contraseña actual</label>
            <input class="form-control" type="password" name="password_actual"
                   placeholder="Tu contraseña actual" required autocomplete="current-password">
        </div>

        <div class="form-group">
            <label>Nueva contraseña</label>
            <input class="form-control" type="password" name="password"
                   placeholder="Mínimo 6 caracteres" minlength="6" required
                   autocomplete="new-password">
        </div>

        <div class="form-group">
            <label>Confirmar nueva contraseña</label>
            <input class="form-control" type="password" name="confirmar"
                   placeholder="Repite la nueva contraseña" minlength="6" required
                   autocomplete="new-password">
        </div>

        <button class="btn-primary">💾 Guardar contraseña</button>
    </form>

</div>

{% endblock %}
