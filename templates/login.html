{% extends "base.html" %}

{% block content %}

<h2>🐄 Iniciar sesión</h2>

<div class="card">

    {% if error %}
    <p style="color: red;">⚠️ {{ error }}</p>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="Usuario" required
               style="width:100%; padding:8px; margin-bottom:10px; border-radius:6px; border:1px solid #ccc; box-sizing:border-box;">

        <input type="password" name="password" placeholder="Contraseña" required
               style="width:100%; padding:8px; margin-bottom:10px; border-radius:6px; border:1px solid #ccc; box-sizing:border-box;">

        <button style="background:#27ae60; color:white; padding:10px; border:none; border-radius:6px; width:100%; font-size:15px;">
            Entrar
        </button>
    </form>

    <p style="margin-top:15px; text-align:center;">
        ¿No tienes cuenta? <a href="/registro">Crear cuenta</a>
    </p>

</div>

{% endblock %}
