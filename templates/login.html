{% extends "base.html" %}
{% block content %}

<h2>🐄 Iniciar sesión</h2>

<div class="card">

    {% if error %}
    <div class="flash error">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        <div class="form-group">
            <label>Usuario</label>
            <input class="form-control" type="text" name="username"
                   placeholder="Tu nombre de usuario" required
                   autocomplete="username" autocapitalize="none">
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <div style="position:relative;">
                <input class="form-control" type="password" name="password"
                       id="password" placeholder="Tu contraseña" required
                       autocomplete="current-password"
                       style="padding-right:48px;">
                <button type="button" onclick="toggleOjo('password','ojo-login')"
                        style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                               background:none;border:none;cursor:pointer;color:#888;
                               font-size:18px;padding:4px;">
                    <i class="fas fa-eye" id="ojo-login"></i>
                </button>
            </div>
        </div>

        <button class="btn-primary">Entrar</button>
    </form>

    <p style="text-align:center; margin-top:14px; font-size:14px;">
        <a href="/recuperar" style="color:#27ae60;">¿Olvidaste tu contraseña?</a>
    </p>

    <p style="text-align:center; margin-top:8px; font-size:14px; color:#666;">
        ¿No tienes cuenta? <a href="/registro" style="color:#27ae60;">Crear cuenta</a>
    </p>

</div>

<script>
function toggleOjo(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
    }
}
</script>

{% endblock %}
