# render.yaml
# Deploy automático en Render.com
# Sube este archivo a la raíz de tu repositorio.
# Documentación: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: erp-pecuario
    env: python
    region: oregon          # más cercano a América Latina; también puedes usar frankfurt
    plan: free              # cambia a "starter" ($7/mes) para que no hiberne

    buildCommand: pip install -r requirements.txt
    # gthread: 2 workers × 8 hilos = ~16 peticiones concurrentes (app I/O-bound)
    startCommand: gunicorn app:app --workers 2 --threads 8 --worker-class gthread --timeout 60 --bind 0.0.0.0:$PORT

    # Variables de entorno — se configuran en el dashboard de Render
    # NUNCA pongas los valores reales aquí, solo los nombres.
    envVars:
      - key: SUPABASE_KEY
        sync: false          # Render te pedirá el valor en el dashboard

      - key: SECRET_KEY
        generateValue: true  # Render genera una clave aleatoria segura automáticamente

      - key: ENV
        value: production

      - key: TWA_PACKAGE_NAME
        value: com.erpecuario.twa   # Debe coincidir EXACTO con el packageId del AAB y con assetlinks.json

      - key: TWA_SHA256_CERT
        sync: false          # SHA-256 de Play App Signing (Play Console → Integridad de la app), NO el keystore local de Bubblewrap

    # Health check — Render reinicia el servicio si falla
    healthCheckPath: /
